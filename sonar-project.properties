# Exclude test files from analysis
sonar.exclusions=**/tests/**, **/test_*.py, **/*_test.py
sonar.test.exclusions=**/tests/**

# Coverage settings
sonar.coverage.exclusions=**/tests/**, **/test_*.py, **/*_test.py

# Python specific
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPaths=test-results.xml

# Quality Gate thresholds (adjust as needed)
sonar.qualitygate.wait=true

# Ignore Bandit security warnings that are false positives or intentional
# Using # nosonar comments in source code instead

# Duplication detection settings
sonar.cpd.minimumTokens=200  # Increase from default 100 to reduce false positives
sonar.cpd.exclusions=**/__init__.py, **/models.py, **/schemas.py, **/dto.py

# Security hotspot exclusions for intentional security decisions
sonar.security.exclusions=src/canvas_code_correction/cli.py,src/canvas_code_correction/config.py,src/canvas_code_correction/runner.py,src/canvas_code_correction/uploader.py
