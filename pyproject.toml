[build-system]
requires = ["uv_build>=0.8.19,<0.9.0"]
build-backend = "uv_build"

[dependency-groups]
docs = [
  "mkdocs>=1.6.1",
  "mkdocs-glightbox>=0.5.2",
  "mkdocs-material>=9.7.1",
  "mkdocs-mermaid2-plugin>=1.2.3"
]
dev = [
  "pytest>=9.0.2",
  "pytest-datadir>=1.8.0",
  "pytest-xdist>=3.8.0",
  "pytest-cov>=7.0.0",
  "ipython>=9.9.0",
  "poethepoet>=0.40.0",
  "prek>=0.2.25",
  "ruff>=0.14.10",
  "mypy>=1.19.1",
  "pre-commit>=3.7.0"
]

[project]
name = "canvas-code-correction"
version = "2.0.0a0"
description = "Framework for orchestrating Canvas assignment corrections with Prefect, Docker, and automated uploads."
readme = "README.md"
requires-python = ">=3.13"
authors = [
  {name = "Canvas Code Correction Maintainers"}
]
license = {text = "MIT"}
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.13",
  "License :: OSI Approved :: MIT License",
  "Operating System :: POSIX :: Linux"
]
dependencies = [
  "prefect[docker]>=3.6.9",
  "prefect-aws>=0.7.2",
  "httpx>=0.28.1",
  "docker>=7.1.0",
  "pydantic>=2.12.5",
  "typer>=0.20.1",
  "python-dotenv>=1.2.1",
  "canvasapi>=3.4.0",
  "prefect-aws>=0.7.2",
  "boto3>=1.42.19"
]

[project.scripts]
ccc = "canvas_code_correction.cli:app"

[tool.bandit]
exclude_dirs = ["tests"]

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_provider = "pep621"

[tool.poe.tasks]
docker-publish = {sequence = ["_docker_build", "_docker_push"], help = "Build and push docker image for base runner"}
_docker_build.cmd = "docker build -t jakob1379/canvas-grader:latest . -f containers/grader/Dockerfile"
_docker_push.cmd = "docker push jakob1379/canvas-grader:latest"
clean.shell = "uvx pyclean --debris=all --verbose --ignore=.direnv ."
prefect.shell = 'prefect server start'
s3.shell = "mkdir -p workspace && weed server -s3 -dir ./workspace -volume.max=5"

[tool.pytest.ini_options]
minversion = "8.3"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
markers = [
  "integration: marks tests that exercise live Canvas API",
  "local: marks tests that can run locally without external dependencies"
]
filterwarnings = [
  "error::DeprecationWarning",
  "ignore::DeprecationWarning:coolname"
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []
