[build-system]
requires = ["uv_build>=0.8.19,<0.9.0"]
build-backend = "uv_build"

[project]
name = "canvas-code-correction"
version = "2.0.0a0"
description = "Framework for orchestrating Canvas assignment corrections with Prefect, Docker, and automated uploads."
readme = { file = "README.org", content-type = "text/plain" }
requires-python = ">=3.13"
authors = [
    { name = "Canvas Code Correction Maintainers" },
]
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
]
dependencies = [
    "prefect>=3.4.23",
    "httpx>=0.28.1",
    "docker>=7.1.0",
    "pydantic>=2.12.0",
    "typer>=0.19.2",
    "python-dotenv>=1.1.1",
]

[project.scripts]
ccc = "canvas_code_correction.cli:app"

[dependency-groups]
tests = [
    "pytest>=8.4.2",
    "pytest-datadir>=1.8.0",
    "pytest-xdist>=3.8.0",
    "pytest-cov>=7.0.0",
]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-glightbox>=0.5.1",
    "mkdocs-material>=9.6.21",
    "mkdocs-mermaid2-plugin>=1.2.2",
]
dev = [
    "pre-commit>=4.3.0",
    "ruff>=0.14.0",
]

[tool.pytest.ini_options]
minversion = "8.3"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
filterwarnings = [
    "error::DeprecationWarning",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_provider = "pep621"
