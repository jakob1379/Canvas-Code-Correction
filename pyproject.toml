[build-system]
requires = ["uv_build>=0.8.19,<0.9.0"]
build-backend = "uv_build"

[project]
name = "canvas-code-correction"
version = "2.0.0a0"
description = "Framework for orchestrating Canvas assignment corrections with Prefect, Docker, and automated uploads."
readme = { file = "README.org", content-type = "text/plain" }
requires-python = ">=3.13"
authors = [
    { name = "Canvas Code Correction Maintainers" },
]
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
]
dependencies = [
    "prefect>=2.16.0",
    "httpx>=0.27.0",
    "docker>=7.0.0",
    "pydantic>=2.7.0",
    "typer>=0.12.3",
    "python-dotenv>=1.0.1",
]

[project.optional-dependencies]
tests = [
    "pytest",
    "pytest-datadir",
    "pytest-xdist",
    "pytest-cov",
]
docs = [
    "mkdocs",
    "mkdocs-glightbox",
    "mkdocs-material",
    "mkdocs-mermaid2-plugin",
]
dev = [
    "pre-commit",
    "ruff",
]

[project.scripts]
ccc = "canvas_code_correction.cli:app"

[dependency-groups]
tests = [
    "pytest",
    "pytest-datadir",
    "pytest-xdist",
    "pytest-cov",
]
docs = [
    "mkdocs",
    "mkdocs-glightbox",
    "mkdocs-material",
    "mkdocs-mermaid2-plugin",
]
dev = [
    "pre-commit",
    "ruff",
]

[tool.pytest.ini_options]
minversion = "8.3"
addopts = "-ra --strict-markers"
testpaths = ["tests"]
filterwarnings = [
    "error::DeprecationWarning",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_provider = "pep621"
