site_name: Canvas Code Correction v2
site_description: Prefect-based automation for Canvas submission correction
theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.instant
    - navigation.tracking
    - content.action.edit
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight
plugins:
  - search
  - mermaid2
nav:
  - Overview: index.md
  - Architecture: architecture.md
