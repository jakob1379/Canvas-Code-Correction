---
name: Deploy Documentation
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - zensical.toml
      - pyproject.toml
      - .github/workflows/deploy-docs.yml
      - docs/stylesheets/**
      - docs/assets/**
      - src/**
      - tests/**
      - scripts/**
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: '3.13'
      - name: Install dependencies
        run: uv sync --all-groups

      # Restore cached coverage reports to avoid duplicate test runs
      - name: Restore coverage reports cache
        id: coverage-cache
        uses: actions/cache@v4
        with:
          path: |
            coverage.json
            htmlcov
          key: coverage-${{ runner.os }}-${{ hashFiles('src/**', 'tests/**', 'pyproject.toml',
            'uv.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-
      - name: Run tests with coverage
        if: steps.coverage-cache.outputs.cache-hit != 'true'
        run: |
          uv run pytest \
            --cov=src/canvas_code_correction \
            --cov-report=json:coverage.json \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            -m "not integration and not e2e"
      - name: Generate coverage badge
        run: |
          mkdir -p site/badges .github/badges
          uv run python scripts/generate_coverage_badge.py \
            --coverage-json coverage.json \
            --output site/badges/coverage.json \
            --verbose
          cp site/badges/coverage.json .github/badges/coverage.json
      - name: Move coverage reports to site directory
        run: |
          mkdir -p site
          cp -r htmlcov site/htmlcov
          cp coverage.json site/coverage.json
      - name: Build documentation
        run: uv run zensical build --strict --clean
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
