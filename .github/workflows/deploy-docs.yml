---
name: Deploy Documentation
on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Check changed files
        id: filter
        run: |
          sha="${{ github.event.workflow_run.head_sha }}"
          parent=$(git rev-parse "${sha}^" 2>/dev/null || echo "")
          if [ -z "$parent" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$parent" "$sha" -- \
              docs src tests scripts \
              zensical.toml pyproject.toml \
              .github/workflows/deploy-docs.yml | grep -q .; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi
  deploy:
    needs: check
    if: needs.check.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/configure-pages@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.13'
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Download coverage artifacts
        uses: actions/download-artifact@v7
        with:
          name: coverage-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate coverage badge
        run: |
          mkdir -p site/badges .github/badges
          uv run python scripts/generate_coverage_badge.py \
            --coverage-json coverage.json \
            --output site/badges/coverage.json \
            --verbose
          cp site/badges/coverage.json .github/badges/coverage.json
      - name: Move coverage reports to site
        run: |
          mkdir -p site
          cp -r htmlcov site/htmlcov
          cp coverage.json site/coverage.json
      - name: Build documentation
        run: uv run zensical build --strict --clean
      - name: Create CNAME file for custom domain
        run: echo "ccc.jgalabs.dk" > site/CNAME
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
