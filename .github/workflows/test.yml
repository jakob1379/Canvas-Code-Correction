---
name: Test
on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      rustfs:
        image: rustfs/rustfs:latest
        env:
          RUSTFS_ACCESS_KEY: rustfsadmin
          RUSTFS_SECRET_KEY: rustfsadmin
        options: >-
          --health-cmd="true"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=20
        ports: [9000:9000, 9001:9001]
    env:
      RUSTFS_ENDPOINT: http://localhost:9000
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_BUCKET_NAME: test-assets
      RUSTFS_PREFIX: dev
      CANVAS_API_URL: https://canvas.instructure.com
      # CANVAS_API_TOKEN and CANVAS_COURSE_ID must be set as repository secrets
      CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
      CANVAS_COURSE_ID: ${{ secrets.CANVAS_COURSE_ID }}
      CANVAS_TEST_ASSIGNMENT_ID: ${{ secrets.CANVAS_TEST_ASSIGNMENT_ID }}
      CCC_WORKSPACE_ROOT: /tmp/ccc/workspaces
      PREFECT_API_URL: http://localhost:4200/api
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Setup RustFS for testing
        if: env.CANVAS_API_TOKEN != ''
        run: |
          # Wait for RustFS to be ready
           timeout 30 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://localhost:9000 | grep -q "^403$"; do sleep 1; done'
          # Run setup script
          uv run python scripts/setup-rustfs.py
      - name: Run unit tests
        run: uv run pytest tests/unit -v --strict-markers --cov=src --cov-report=xml
          --cov-report=term
      - name: Run integration tests (requires Canvas credentials)
        if: env.CANVAS_API_TOKEN != ''
        run: |
          uv run pytest tests/integration -v --strict-markers -m integration
      - name: Run e2e tests (requires Docker and Canvas credentials)
        if: env.CANVAS_API_TOKEN != ''
        run: |
          # Start Docker daemon (already running on GitHub Actions)
          # Run e2e tests
          uv run pytest tests/e2e -v --strict-markers -m e2e
      - name: Run linting
        run: |
          uv run ruff check src
          uv run pyrefly check src
      - name: Run formatting check
        run: uv run ruff format --check src
      - name: Build documentation
        run: uv run zensical build --strict
      - name: Run pre-commit hooks
        run: uv run prek run --all-files
