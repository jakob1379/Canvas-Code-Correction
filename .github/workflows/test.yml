---
name: Test
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      rustfs:
        image: rustfs/rustfs:latest
        env:
          RUSTFS_ACCESS_KEY: rustfsadmin
          RUSTFS_SECRET_KEY: rustfsadmin
        options: >-
          --health-cmd="true"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=20
        ports: [9000:9000, 9001:9001]
    env:
      RUSTFS_ENDPOINT: http://localhost:9000
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_BUCKET_NAME: test-assets
      RUSTFS_PREFIX: dev
      CANVAS_API_URL: https://canvas.instructure.com
      # CANVAS_API_TOKEN and CANVAS_COURSE_ID must be set as repository secrets
      CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
      CANVAS_COURSE_ID: ${{ secrets.CANVAS_COURSE_ID }}
      CANVAS_TEST_ASSIGNMENT_ID: ${{ secrets.CANVAS_TEST_ASSIGNMENT_ID }}
      CCC_WORKSPACE_ROOT: /tmp/ccc/workspaces
      PREFECT_API_URL: http://localhost:4200/api
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: '3.13'
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Setup RustFS for testing
        if: env.CANVAS_API_TOKEN != ''
        run: |
          # Wait for RustFS to be ready
           timeout 30 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://localhost:9000 | grep -q "^403$"; do sleep 1; done'
          # Run setup script
          uv run python scripts/setup-rustfs.py
      - name: Run unit tests
        run: uv run pytest tests/unit -v --strict-markers --cov=src --cov-report=xml
          --cov-report=term
      - name: Generate HTML coverage report
        run: uv run coverage html --data-file=.coverage
      - name: Upload coverage to smokeshow
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          uv run smokeshow upload htmlcov \
            --github-status-description="Coverage {coverage-percentage}" \
            --github-coverage-threshold=70
        env:
          SMOKESHOW_AUTH_KEY: ${{ secrets.SMOKESHOW_AUTH_KEY }}
          SMOKESHOW_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKESHOW_GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Run integration tests (requires Canvas credentials)
        if: env.CANVAS_API_TOKEN != ''
        run: |
          uv run pytest tests/integration -v --strict-markers -m integration --no-cov
      - name: Run e2e tests (requires Docker and Canvas credentials)
        if: env.CANVAS_API_TOKEN != ''
        run: |-
          # Start Docker daemon (already running on GitHub Actions)
          # Run e2e tests
           uv run pytest tests/e2e -v --strict-markers -m e2e --no-cov
